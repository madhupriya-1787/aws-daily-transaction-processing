name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - "ecs-app/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::441661110146:role/github-oidc-role
          aws-region: ap-southeast-2

      - name: Login to Amazon ECR
        run: |
          aws ecr get-login-password --region ap-southeast-2 | docker login --username AWS --password-stdin 441661110146.dkr.ecr.ap-southeast-2.amazonaws.com

      - name: Build Docker Image
        run: |
          docker build -t daily-transaction-processing-app ./ecs-app

      - name: Tag Docker Image
        run: |
          docker tag daily-transaction-processing-app:latest 441661110146.dkr.ecr.ap-southeast-2.amazonaws.com/daily-transaction-processing-app:latest

      - name: Push Docker Image to ECR
        run: |
          docker push 441661110146.dkr.ecr.ap-southeast-2.amazonaws.com/daily-transaction-processing-app:latest
